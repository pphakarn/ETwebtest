  <style>
    /* Avatar */
    df-messenger .df-avatar-icon img,
    df-messenger .df-chat-icon-user img {
      border-radius: 50% !important;
      width: 45px !important;
      height: 45px !important;
      object-fit: cover !important;
    }

    /* Chat bubble */
    df-messenger::part(message) {
      border-radius: 18px !important;
    }

    /* Theme colors */
    df-messenger {
      --df-messenger-bot-message: #e9f5ff;
      --df-messenger-user-message: #dfffe6;

      --df-messenger-button-titlebar-color: #3FA2F6;
      --df-messenger-button-color: #3FA2F6;
    }

    /* Floating position */
    df-messenger {
      right: 20px !important;
      bottom: 20px !important;
    }
